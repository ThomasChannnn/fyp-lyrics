<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>題目頁面 - 廣東歌填詞大賽</title>
    
    <link rel="stylesheet" href="abcjs-audio.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/abcjs/6.2.2/abcjs-basic-min.js" type="text/javascript"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    
    <link rel="stylesheet" href="style.css">
    
    <style>
        #paper { 
            background: white;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            overflow: hidden;
            margin-top: 10px;
        }
        #melody-player-container {
            margin-top: 10px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 8px;
            border: 1px solid #eee;
            min-height: 50px;
        }
        .source-text {
            margin-top: 10px;
            font-size: 0.9rem;
            color: #666;
            font-style: italic;
        }
        body.dark #paper { background: #fff; }
        body.dark #melody-player-container { background: #333; border-color: #444; }
        body.dark .abcjs-inline-audio { filter: invert(1) hue-rotate(180deg); }
        body.dark .source-text { color: #aaa; }
    </style>
</head>
<body>

    <header class="navbar">
        <div style="display: flex; justify-content: space-between; align-items: center; max-width: 80%; margin: 0 auto;">
            <a href="index.html">⬅️ 返回首頁</a>
            <button id="theme-toggle" class="btn" style="width: auto; padding: 10px 20px; font-size: 1rem;">🌙</button>
        </div>
    </header>

    <main class="container">
        <div class="card text-center">
            <h1 id="display-id">題目載入中...</h1>
        </div>

        <section class="card tone-section">
            <h3>🎁 0243填詞大法</h3>
            <p style="color: #666; font-size: 0.85rem; margin-bottom: 10px;">估埋對應嘅「0243」音調！</p>
            <button class="btn btn-reveal" onclick="showAnswer()">👀 答案</button>
            <div id="tone-answer-display" class="tone-answer-box"></div>
        </section>

        <section class="card tone-section">
            <h3>📝 填詞題目</h3>
            <p style="color: #666; font-size: 0.85rem; margin-bottom: 10px;">為歌詞缺漏嘅窿窿填詞！</p>
            <div id="hint-display" class="hint-answer-box" style="display:block; margin-top:10px;"></div>
        </section>

        <section class="card">
            <span class="label-text">🎵 樂譜</span>
            <div id="paper"></div> 
            <p id="display-source" class="source-text"></p>
        </section>

        <section class="card" id="audio-section">
            <div class="audio-player-wrapper">
                <span class="label-text">🎹 主旋律</span>
                <div id="melody-player-container"></div>
            </div>
        </section>
    </main>

    <script>
        const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQXFw5xPZfy8OjaWdMarBe350dlIx0u-O17bBe2SMl2ogYW2k0SPm1MkaLjktBT9VLIcGemgmxXfIi8/pub?output=csv"; 

        async function initPage() {
            try {
                const response = await fetch(SHEET_URL);
                const csvText = await response.text();
                const results = Papa.parse(csvText, { header: true, skipEmptyLines: true });

                const songDatabase = {};
                results.data.forEach(row => {
                    if (row.id) {
                        const id = row.id.toString().trim().padStart(3, '0');
                        songDatabase[id] = {
                            id: id,
                            source: row.source,
                            abc: row.abc, 
                            hint: row.hint || "未有題目提供",
                            tone_answer: row.tone_answer ? row.tone_answer.replace(/[\[\]"]/g, '').split(',') : []
                        };
                    }
                });

                const urlParams = new URLSearchParams(window.location.search);
                let currentId = urlParams.get('id') || "001";
                currentId = currentId.trim().padStart(3, '0');

                if (songDatabase[currentId]) {
                    renderPage(currentId, songDatabase[currentId]);
                } else {
                    document.getElementById('display-id').innerText = "找不到題目 #" + currentId;
                }
            } catch (error) {
                console.error("Error:", error);
                document.getElementById('display-id').innerText = "載入失敗";
            }
        }

        function renderPage(id, data) {
            document.getElementById('display-id').innerText = "題目編號 #" + id;
            document.getElementById('tone-answer-display').innerText = data.tone_answer.join('-');
            document.getElementById('hint-display').innerText = data.hint;
            document.getElementById('display-source').innerText = "原曲: " + (data.source || "未知");

            if (data.abc) {
                const rawAbc = data.abc.replace(/\\n/g, "\n"); 
                const fullAbc = `X:${data.id}\nT:\nM:none\nQ:1/4=100\nK:C\nL:1/16\n${rawAbc}`;

                const visualObj = ABCJS.renderAbc("paper", fullAbc, { 
                    responsive: "resize",
                    scale: 2,
                    staffwidth: 300,
                    paddingleft: 0,
                    paddingright: 0,
                    add_classes: true
                })[0];

                const svg = document.querySelector("#paper svg");
                if (svg) {
                    svg.style.width = "100%";
                    svg.style.height = "auto";
                }

                if (ABCJS.synth.supportsAudio()) {
                    const synthControl = new ABCJS.synth.SynthController();
                    synthControl.load("#melody-player-container", null, {
                        displayRestart: true,
                        displayPlay: true,
                        displayProgress: true,
                        inline: true 
                    });

                    const createSynth = new ABCJS.synth.CreateSynth();
                    createSynth.init({ visualObj: visualObj }).then(() => {
                        synthControl.setTune(visualObj, false);
                    });
                }
            }
        }

        function showAnswer() {
            const box = document.getElementById('tone-answer-display');
            box.style.display = (box.style.display === 'block') ? 'none' : 'block';
        }

        function showHint() {
            const box = document.getElementById('hint-display');
            box.style.display = (box.style.display === 'block') ? 'none' : 'block';
        }

        function setupTheme() {
            const toggle = document.getElementById('theme-toggle');
            const isDark = localStorage.getItem('darkMode') === 'true';
            if (isDark) { document.body.classList.add('dark'); toggle.textContent = '☀️'; }
            toggle.addEventListener('click', () => {
                document.body.classList.toggle('dark');
                const darkMode = document.body.classList.contains('dark');
                toggle.textContent = darkMode ? '☀️' : '🌙';
                localStorage.setItem('darkMode', darkMode);
            });
        }

        initPage();
        setupTheme();
    </script>
</body>
</html>
