<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>題目頁面 - 廣東歌填詞大賽</title>
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* 0243 Game Styles */
        .tone-section {
            background-color: #FFF8E1; 
            border: 2px dashed #FFC107;
            text-align: center;
        }
        .tone-answer-box {
            margin-top: 15px;
            font-size: 2rem;
            font-weight: bold;
            letter-spacing: 5px;
            color: #4A90E2;
            background: #fff;
            padding: 10px;
            border-radius: 8px;
            display: none; /* Hidden by default */
        }
        .btn-reveal {
            background-color: #FFC107;
            color: #333;
            margin-top: 10px;
        }

        /* Source Text Style */
        .source-text {
            font-size: 0.85rem;
            color: #888;
            text-align: center;
            margin-top: 8px;
            font-style: italic;
        }
    </style>
</head>
<body>

    <header class="navbar">
        <div style="display: flex; justify-content: space-between; align-items: center; max-width: 600px; margin: 0 auto;">
        <a href="index.html">⬅️ 返回首頁 (Back)</a>
        <button id="theme-toggle" class="btn" style="width: auto; padding: 10px 20px; font-size: 1rem;">🌙</button>
        </div>
    </header>

    <main class="container">

        <div class="card text-center">
            <h1 id="display-id">題目載入中...</h1>
        </div>

        <section class="card tone-section">
            <h3>🎁 0243填詞大法</h3>
            <p style="color: #666; font-size: 0.9rem;">估埋對應嘅「0243」音調！</p>
            
            <button class="btn btn-reveal" onclick="showAnswer()">👀 答案</button>
            
            <div id="tone-answer-display" class="tone-answer-box">
                </div>
        </section>

            <section class="card">
                <span class="label-text">🎵 樂譜 (Music Score)</span>
                
                <img id="img-score" src="" alt="Music Score" class="score-image">
                
                <p id="display-source" class="source-text"></p>
            </section>

        <section class="card" id="audio-section">
            <div class="audio-player-wrapper">
                <span class="label-text">🎹 主旋律 (Melody)</span>
                <audio id="audio-melody" controls>
                    <source src="" type="audio/mpeg">
                </audio>
            </div>
            
            <hr style="border: 0; border-top: 1px solid #eee; margin: 15px 0;">

            <div class="audio-player-wrapper">
                <span class="label-text">🥁 純音樂/伴奏 (Backing Track)</span>
                <audio id="audio-backing" controls>
                    <source src="" type="audio/mpeg">
                </audio>
            </div>
        </section>

    </main>

    <script>
        // ---------------------------------------------------------
        // 1. THE DATABASE
        // ---------------------------------------------------------
        const songDatabase = {
            "001": {
                source: "原曲：Old MacDonald Had a Farm",
                tone_answer: "4-4-4-0-2-2-0",
                image: "score/001.png",
                melody: "melody/001.mp3",
                backing: "backing/001.mp3"
            },
            "002": {
                source: "原曲：Twinkle Twinkle Little Star",
                tone_answer: "0-0-4-4-3-3-4",
                image: "score/002.png",
                melody: "melody/002.mp3",
                backing: "backing/002.mp3"
            },
            "003": {
                source: "原曲：London Bridge is Falling Down",
                tone_answer: "4-3-3-4-2-4-3",
                image: "score/003.png",
                melody: "melody/003.mp3",
                backing: "backing/003.mp3"
            },
            "004": {
                source: "原曲：Happy Birthday to You",
                tone_answer: "0-0-2-0-4-2",
                image: "score/004.png",
                melody: "melody/004.mp3",
                backing: "backing/004.mp3"
            },
            "005": {
                source: "原曲：We Wish You a Merry Christmas",
                tone_answer: "0-4-4-3-4-2-0-0",
                image: "score/005.png",
                melody: "melody/005.mp3",
                backing: "backing/005.mp3"
            },
            "006": {
                source: "原曲：Jingle Bells",
                tone_answer: "2-2-2-2-2-2-2-3-0-0-2",
                image: "score/006.png",
                melody: "melody/006.mp3",
                backing: "backing/006.mp3"
            },
            "007": {
                source: "原曲：多啦A夢",
                tone_answer: "0-4-4-2-3-2-4",
                image: "score/007.png",
                melody: "melody/007.mp3",
                backing: "backing/007.mp3"
            },
            "008": {
                source: "原曲：It's a Small World",
                tone_answer: "4-4-3-4-3-3-3",
                image: "score/008.png",
                melody: "melody/008.mp3",
                backing: "backing/008.mp3"
            },
            "009": {
                source: "原曲：Lonely Christmas",
                tone_answer: "2-4-2-4-4-3",
                image: "score/009.png",
                melody: "melody/009.mp3",
                backing: "backing/009.mp3"
            },
            "010": {
                source: "原曲：Greensleeves",
                tone_answer: "0-4-4-3-3-3-4-2-0",
                image: "score/010.png",
                melody: "melody/010.mp3",
                backing: "backing/010.mp3"
            }
        };

        // ---------------------------------------------------------
        // 2. PAGE LOGIC
        // ---------------------------------------------------------
        
        // Get ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const currentId = urlParams.get('id');

        // Grab Elements
        const titleEl = document.getElementById('display-id');
        const sourceEl = document.getElementById('display-source');
        const toneAnswerEl = document.getElementById('tone-answer-display');
        const imgEl = document.getElementById('img-score');
        const melodyEl = document.getElementById('audio-melody');
        const backingEl = document.getElementById('audio-backing');

        // Check ID and Render
        if (currentId && songDatabase[currentId]) {
            const data = songDatabase[currentId];
            console.log("Loading Question:", currentId);

            // 1. Text Info
            titleEl.innerText = "題目編號 #" + currentId;
            sourceEl.innerText = data.source;
            toneAnswerEl.innerText = data.tone_answer;

            // 2. Media Paths (Assuming everything is in 'assets' folder)
            imgEl.src = "assets/" + data.image;       // e.g. assets/score/001.png
            melodyEl.src = "assets/" + data.melody;   // e.g. assets/melody/001.mp3
            backingEl.src = "assets/" + data.backing; // e.g. assets/backing/001.mp3
            
            // 3. Refresh Audio
            melodyEl.load();
            backingEl.load();

        } else {
            // Error Handling
            titleEl.innerText = "題目不存在";
            document.querySelector('.container').innerHTML = 
                "<div class='card text-center'>" +
                "<h1 style='color:red;'>❌ 找不到題目</h1>" +
                "<p>編號 #" + (currentId || "Unknown") + " 不在資料庫中。</p>" +
                "<a href='index.html' class='btn btn-primary'>返回首頁</a>" +
                "</div>";
        }

        // Toggle Answer Visibility
        function showAnswer() {
            const box = document.getElementById('tone-answer-display');
            if (box.style.display === 'block') {
                box.style.display = 'none';
            } else {
                box.style.display = 'block';
            }
        }
    </script>
    <script>
        const toggle = document.getElementById('theme-toggle');
        const body = document.body;
        const isDark = localStorage.getItem('darkMode') === 'true';

        if (isDark) {
        body.classList.add('dark');
        toggle.textContent = '☀️';
        }

        toggle.addEventListener('click', () => {
        body.classList.toggle('dark');
        const darkMode = body.classList.contains('dark');
        toggle.textContent = darkMode ? '☀️' : '🌙';
        localStorage.setItem('darkMode', darkMode);
        });
    </script>
</body>
</html>
