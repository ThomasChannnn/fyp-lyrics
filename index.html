<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>廣東歌填詞大賽 - 首頁</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.4/html5-qrcode.min.js"></script>
</head>
<body>

    <header class="navbar">
        <div style="display: flex; justify-content: space-between; align-items: center; max-width: 80%; margin: 0 auto;">
        <a href="index.html">🏠 填詞大師</a>
        <button id="theme-toggle" class="btn" style="width: auto; padding: 10px 20px; font-size: 1rem;">🌙</button>
        </div>
    </header>

    <main class="container">
        
        <section class="card">
            <h2>📜 遊戲規則</h2>
            <ul style="padding-left: 20px;">
                <li>抽1張<strong>旋律卡</strong>。</li>
                <li>掃瞄 QR Code 或者輸入題目編號。</li>
                <li>聆聽旋律。</li>
                <li>估下<strong>音調（0243），</strong>之後為歌詞缺漏嘅<strong>窿窿</strong>填詞。</li>
                <li>展示答案，大家投票選出最合適嘅歌詞！</li>
            </ul>
        </section>

        <section class="card">
            <h3>搜尋題目</h3>
            
            <div class="input-group">
                <input type="text" placeholder="輸入編號 (例如: 001)" id="questionInput">
                <button class="btn btn-primary" onclick="goToQuestionManual()">確認前往</button>
            </div>

            <div class="text-center" style="margin: 15px 0; color: #aaa;">—— 或 ——</div>

            <button class="btn btn-secondary" onclick="openScanner()">
                📷 開啟相機掃瞄 QR Code
            </button>
        </section>

    </main>

    <div id="scannerModal" class="modal-overlay">
        <div class="modal-content">
            <button class="close-btn" onclick="closeScanner()">&times;</button>
            <h3>掃瞄 QR Code</h3>
            <p style="font-size: 0.9rem; color: #666; margin-bottom: 10px;">請將 QR Code 對準鏡頭</p>
            
            <div id="reader"></div>
            
            <p id="scanStatus" style="margin-top:10px; font-weight:bold; color:var(--primary-color)"></p>
        </div>
    </div>

    <script>
        let html5QrcodeScanner = null;

        function goToQuestionManual() {
            const input = document.getElementById('questionInput').value;
            if(input) window.location.href = 'question.html?id=' + input;
            else alert("請輸入編號！");
        }

        function openScanner() {
            document.getElementById('scannerModal').style.display = 'flex';
            document.getElementById('scanStatus').innerText = "啟動相機中...";

            setTimeout(() => {
                html5QrcodeScanner = new Html5QrcodeScanner(
                    "reader", 
                    { 
                        fps: 10, 
                        qrbox: { width: 250, height: 250 }
                    },
                    false
                );
                
                html5QrcodeScanner.render(onScanSuccess, onScanError);
                document.getElementById('scanStatus').innerText = "正在掃瞄...";
            }, 100);
        }

        function closeScanner() {
            document.getElementById('scannerModal').style.display = 'none';

            if (html5QrcodeScanner) {
                html5QrcodeScanner.clear().then(() => {
                    console.log("Camera stopped.");
                }).catch(error => {
                    console.error("Failed to clear scanner. ", error);
                });
            }
        }

        function onScanSuccess(decodedText, decodedResult) {
            document.getElementById('scanStatus').innerText = "✅ 成功！跳轉中...";
            
            html5QrcodeScanner.clear();

            if (decodedText.includes("question.html")) {
                window.location.href = decodedText; 
            } else {
                window.location.href = 'question.html?id=' + decodedText;
            }
        }

        function onScanError(errorMessage) {
        }
    </script>
    <script>
        const toggle = document.getElementById('theme-toggle');
        const body = document.body;
        const isDark = localStorage.getItem('darkMode') === 'true';

        if (isDark) {
        body.classList.add('dark');
        toggle.textContent = '☀️';
        }

        toggle.addEventListener('click', () => {
        body.classList.toggle('dark');
        const darkMode = body.classList.contains('dark');
        toggle.textContent = darkMode ? '☀️' : '🌙';
        localStorage.setItem('darkMode', darkMode);
        });
    </script>
</body>
</html>
